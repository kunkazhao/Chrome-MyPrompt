<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赵二的提示词</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app-container">
    <!-- 分类导航与头部合并区域 -->
    <section class="categories-section">
      <div class="categories-wrapper" id="categories-wrapper">
        <div id="categories-list" class="categories-list">
          <!-- 动态加载 Tab，例如：置顶、通用、文字、代码、图、视频 -->
        </div>
      </div>
      <div class="category-actions-group">
        <button id="btn-add-prompt" class="btn btn-primary btn-sm btn-compact" title="新建提示词">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="btn-manage-categories" class="btn-icon btn-compact" title="管理分类">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </section>

    <!-- 提示词卡片列表 -->
    <main class="prompts-section">
      <div id="prompts-container" class="prompts-container">
        <!-- 动态加载提示词卡片 -->
      </div>
      <div id="empty-state" class="empty-state hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="15" y2="15"></line></svg>
        <p>暂无提示词，快去新建一个吧！</p>
      </div>
    </main>
  </div>

  <!-- 编辑/新建提示词 Modal 弹窗 -->
  <div id="prompt-modal" class="modal-overlay hidden">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3 id="prompt-modal-title">新建提示词</h3>
        <button id="btn-close-prompt-modal" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="select-prompt-category">分类</label>
          <select id="select-prompt-category" class="form-control">
            <!-- 动态加载分类选项 -->
          </select>
        </div>
        <div class="form-group">
          <label for="input-prompt-name">名称</label>
          <input type="text" id="input-prompt-name" class="form-control" placeholder="输入易记的名称，例如：邮件润色" maxlength="30" required>
        </div>
        <div class="form-group">
          <label for="input-prompt-content">提示词内容</label>
          <textarea id="input-prompt-content" class="form-control textarea" placeholder="输入提示词的详细内容..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel-prompt" class="btn btn-secondary">取消</button>
        <button id="btn-save-prompt" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 分类管理 Modal 弹窗 -->
  <div id="category-modal" class="modal-overlay hidden">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3>管理分类</h3>
        <button id="btn-close-category-modal" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="manage-categories-list" class="manage-categories-list">
          <!-- 动态渲染分类编辑/删除与拖拽项 -->
        </div>
        
        <div class="add-category-row">
          <input type="text" id="input-new-category" class="form-control" placeholder="新增分类名称" maxlength="15">
          <button id="btn-add-category" class="btn btn-primary btn-sm">添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示框 -->
  <div id="toast" class="toast hidden">
    <div class="toast-content">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toast-icon"><polyline points="20 6 9 17 4 12"></polyline></svg>
      <span id="toast-message">已复制到剪贴板！</span>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
